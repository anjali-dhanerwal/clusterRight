name: aurora-ops-review
version: 1.0.0
description: Aurora Cluster Operational Review Agent

runtime:
  type: python
  version: "3.12"
  entrypoint: aurora_cluster_operational_review:app

server:
  host: 0.0.0.0
  port: 8085
  timeout: 900

environment:
  AWS_REGION: us-east-1

dependencies:
  - bedrock-agentcore>=1.1.0
  - boto3>=1.34.0
  - mcp>=1.0.0
  - strands-agents>=1.0.0
  - strands-agents-tools
  - python-dotenv>=1.0.0
  - uv>=0.9.0
